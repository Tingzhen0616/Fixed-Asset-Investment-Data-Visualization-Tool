<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固定资产投资数据可视化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 32px;
        }
        .section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.01);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .upload-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }
        .upload-hint {
            font-size: 13px;
            color: #999;
        }
        #fileInput {
            display: none;
        }
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #f8f9ff;
            border-radius: 10px;
            border: 1px solid #e0e4ff;
        }
        .file-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .file-name {
            font-weight: 600;
            color: #333;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover {
            background: #ff3838;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        .select {
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background: white;
            min-width: 150px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .industry-manager {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-start;
        }
        .industry-select {
            flex: 1;
            min-width: 200px;
        }
        .industry-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .industry-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }
        .industry-tag .remove {
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .industry-tag .remove:hover {
            opacity: 1;
        }
        .chart-container {
            width: 100%;
            height: 800px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e0e4ff;
            overflow: hidden;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .stat-card {
            padding: 20px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 10px;
            border: 1px solid #667eea30;
        }
        .stat-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 固定资产投资数据可视化工具</h1>
            <p>纯前端实现，支持CSV/Excel批量上传、数据计算、图表展示、数据管理</p>
        </div>
        <div class="content">
            <div class="section">
                <div class="section-title">文件上传</div>
                <input type="file" id="fileInput" multiple accept=".csv,.xlsx,.xls,.json">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击或拖拽上传 CSV / Excel / JSON 文件</div>
                    <div class="upload-hint">支持批量上传，JSON文件为之前保存的数据</div>
                </div>
            </div>
            
            <div class="section" id="fileSection" style="display: none;">
                <div class="section-title">文件管理</div>
                <div class="file-list" id="fileList"></div>
                <div style="margin-top: 16px; display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="saveToLocal()">💾 保存到本地</button>
                    <button class="btn btn-danger" onclick="clearAllFiles()">🗑️ 清空所有</button>
                </div>
            </div>
            
            <div class="section" id="industrySection" style="display: none;">
                <div class="section-title">行业管理</div>
                <div class="industry-manager">
                    <select class="select industry-select" id="industrySelect" multiple style="height: 120px;"></select>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <button class="btn btn-primary" onclick="addSelectedIndustries()">➕ 添加选中</button>
                        <button class="btn btn-danger" onclick="clearAllIndustries()">🗑️ 清空所有</button>
                    </div>
                </div>
                <div class="industry-tags" id="industryTags"></div>
            </div>
            
            <div class="section" id="chartSection" style="display: none;">
                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
                    <div class="section-title" style="margin-bottom: 0;">图表展示</div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label style="font-size: 14px; color: #555;">时间维度</label>
                        <select class="select" id="timeDimension" onchange="updateChart()" style="min-width: 100px;">
                            <option value="month">月度</option>
                            <option value="quarter">季度</option>
                        </select>
                    </div>
                </div>
                <div class="chart-container" id="chart"></div>
                <div class="stats" id="stats"></div>
            </div>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let selectedIndustries = [];
        let availableIndustries = [];
        let chart = null;

        document.addEventListener('DOMContentLoaded', () => {
            setupUploadArea();
            initChart();
            loadFromLocal();
        });

        function setupUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        }

        async function handleFiles(files) {
            for (const file of files) {
                if (file.name.endsWith('.json')) {
                    await parseJSON(file);
                } else if (file.name.endsWith('.csv')) {
                    await parseCSV(file);
                } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                    await parseExcel(file);
                }
            }
            updateUI();
        }

        function parseJSON(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const obj = JSON.parse(e.target.result);
                        if (obj.files) {
                            obj.files.forEach(f => uploadedFiles.push(f));
                            if (obj.selectedIndustries) {
                                obj.selectedIndustries.forEach(ind => {
                                    if (!selectedIndustries.includes(ind)) {
                                        selectedIndustries.push(ind);
                                    }
                                });
                            }
                        } else if (Array.isArray(obj)) {
                            obj.forEach(f => uploadedFiles.push(f));
                        }
                    } catch(err) {}
                    resolve();
                };
                reader.readAsText(file);
            });
        }

        function parseCSV(file) {
            return new Promise((resolve) => {
                Papa.parse(file, {
                    complete: (results) => {
                        const data = parseData(results.data, file.name);
                        uploadedFiles.push({
                            name: file.name,
                            remark: '',
                            data: data
                        });
                        resolve();
                    }
                });
            });
        }

        function parseExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    const parsedData = parseData(jsonData, file.name);
                    uploadedFiles.push({
                        name: file.name,
                        remark: '',
                        data: parsedData
                    });
                    resolve();
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function parseData(rawData, fileName) {
            const timeRow = rawData[2];
            const industryRows = rawData.slice(3);
            
            const parsed = {
                fileName: fileName,
                timePoints: [],
                industries: {}
            };

            const times = timeRow.slice(1);
            times.forEach((time, idx) => {
                if (time) {
                    parsed.timePoints.push(time);
                }
            });

            industryRows.forEach(row => {
                let industryName = row[0];
                if (!industryName) return;
                if (industryName.includes('数据来源')) return;

                industryName = fixIndustryName(industryName);
                parsed.industries[industryName] = [];

                times.forEach((time, idx) => {
                    if (!time) return;
                    
                    const normalizedTime = normalizeTime(time);
                    const month = getMonthFromTime(normalizedTime);
                    if (month === 1) return;

                    const value = parseFloat(row[idx + 1]);
                    if (!isNaN(value)) {
                        parsed.industries[industryName].push({
                            time: normalizedTime,
                            month: month,
                            value: value
                        });
                    }
                });
            });

            return parsed;
        }

        function fixIndustryName(name) {
            return name.replace('石油、煤炭及其他燃料加工业加工业', '石油、煤炭及其他燃料加工业');
        }

        function extractIndustryName(fullName) {
            let name = fullName.replace(/固定资产投资.*$/, '');
            if (name === fullName) {
                name = fullName.replace(/（.*$/, '');
            }
            return name.trim() || fullName;
        }

        function normalizeTime(timeStr) {
            let match = timeStr.match(/(\d{4})[-年\/.](\d{1,2})/);
            if (match) {
                return `${match[1]}-${String(match[2]).padStart(2, '0')}`;
            }
            return timeStr;
        }

        function getMonthFromTime(timeStr) {
            let match = timeStr.match(/(\d{4})[-年\/.](\d{1,2})/);
            if (match) {
                return parseInt(match[2]);
            }
            return 0;
        }

        function getYearFromTime(timeStr) {
            const match = timeStr.match(/(\d{4})/);
            if (match) {
                return parseInt(match[1]);
            }
            return 0;
        }

        function getQuarterFromMonth(month) {
            if (month <= 3) return 1;
            if (month <= 6) return 2;
            if (month <= 9) return 3;
            return 4;
        }

        function getQuarterNum(timeStr) {
            const match = timeStr.match(/Q(\d)/);
            if (match) {
                return parseInt(match[1]);
            }
            return 0;
        }

        function calculateMonthOnMonth(data) {
            const result = {};
            
            for (const industry in data.industries) {
                result[industry] = [];
                const points = data.industries[industry];
                
                points.forEach((point) => {
                    result[industry].push({
                        time: point.time,
                        month: point.month,
                        cumulative: point.value
                    });
                });
            }
            
            return result;
        }

        function calculateQuarterly(data) {
            const result = {};
            
            for (const industry in data.industries) {
                result[industry] = [];
                const points = data.industries[industry];
                
                const yearQuarterMap = {};
                points.forEach(point => {
                    const year = getYearFromTime(point.time);
                    const quarter = getQuarterFromMonth(getMonthFromTime(point.time));
                    const key = `${year}-Q${quarter}`;
                    
                    if (!yearQuarterMap[key]) {
                        yearQuarterMap[key] = [];
                    }
                    yearQuarterMap[key].push(point);
                });

                for (const key in yearQuarterMap) {
                    const [year, q] = key.split('-Q');
                    const quarterPoints = yearQuarterMap[key];
                    
                    if (quarterPoints.length === 0) continue;

                    const quarterMonthPriority = {
                        '1': [3, 2, 1],
                        '2': [6, 5, 4],
                        '3': [9, 8, 7],
                        '4': [12, 11, 10]
                    };
                    
                    let selectedPoint = null;
                    const priorities = quarterMonthPriority[q];
                    for (const targetMonth of priorities) {
                        const found = quarterPoints.find(p => getMonthFromTime(p.time) === targetMonth);
                        if (found) {
                            selectedPoint = found;
                            break;
                        }
                    }
                    
                    if (!selectedPoint) continue;

                    result[industry].push({
                        time: key,
                        quarter: parseInt(q),
                        cumulative: selectedPoint.value
                    });
                }
            }
            
            return result;
        }

        function updateUI() {
            updateFileList();
            updateAvailableIndustries();
            const hasData = uploadedFiles.length > 0;
            document.getElementById('fileSection').style.display = hasData ? 'block' : 'none';
            document.getElementById('industrySection').style.display = hasData ? 'block' : 'none';
            document.getElementById('chartSection').style.display = hasData ? 'block' : 'none';
            if (hasData && chart) {
                setTimeout(() => {
                    chart.resize();
                    updateChart();
                }, 50);
            }
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = uploadedFiles.map((file, idx) => `
                <div class="file-item">
                    <div class="file-info">
                        <span class="file-name">📄 ${file.name}</span>
                    </div>
                    <button class="btn btn-danger" onclick="removeFile(${idx})">删除</button>
                </div>
            `).join('');
        }

        function removeFile(idx) {
            uploadedFiles.splice(idx, 1);
            updateUI();
            updateChart();
        }

        function clearAllFiles() {
            if (confirm('确定要清空所有文件吗？')) {
                uploadedFiles = [];
                selectedIndustries = [];
                updateUI();
                updateChart();
            }
        }

        function updateAvailableIndustries() {
            availableIndustries = [];
            uploadedFiles.forEach(file => {
                for (const industry in file.data.industries) {
                    if (!availableIndustries.includes(industry)) {
                        availableIndustries.push(industry);
                    }
                }
            });

            const select = document.getElementById('industrySelect');
            select.innerHTML = availableIndustries.map(ind => 
                `<option value="${ind}">${extractIndustryName(ind)}</option>`
            ).join('');

            if (selectedIndustries.length === 0 && availableIndustries.length > 0) {
                selectedIndustries = availableIndustries.slice(0, 3);
            }
            updateIndustryTags();
        }

        function addSelectedIndustries() {
            const select = document.getElementById('industrySelect');
            Array.from(select.selectedOptions).forEach(opt => {
                if (!selectedIndustries.includes(opt.value)) {
                    selectedIndustries.push(opt.value);
                }
            });
            updateIndustryTags();
            updateChart();
        }

        function removeIndustry(industry) {
            selectedIndustries = selectedIndustries.filter(i => i !== industry);
            updateIndustryTags();
            updateChart();
        }

        function clearAllIndustries() {
            selectedIndustries = [];
            updateIndustryTags();
            updateChart();
        }

        function updateIndustryTags() {
            const tags = document.getElementById('industryTags');
            tags.innerHTML = selectedIndustries.map(ind => `
                <div class="industry-tag">
                    ${extractIndustryName(ind)}
                    <span class="remove" onclick="removeIndustry('${ind}')">×</span>
                </div>
            `).join('');
        }

        function initChart() {
            chart = echarts.init(document.getElementById('chart'));
            window.addEventListener('resize', () => chart.resize());
        }

        function updateChart() {
            if (uploadedFiles.length === 0 || selectedIndustries.length === 0) {
                chart.setOption({
                    graphic: {
                        elements: [{
                            type: 'text',
                            left: 'center',
                            top: 'center',
                            style: {
                                text: '请上传文件并选择行业',
                                fontSize: 24,
                                fill: '#999'
                            }
                        }]
                    }
                });
                return;
            }

            const dimension = document.getElementById('timeDimension').value;

            const allCalculatedData = {};
            uploadedFiles.forEach(file => {
                let calculated;
                if (dimension === 'quarter') {
                    calculated = calculateQuarterly(file.data);
                } else {
                    calculated = calculateMonthOnMonth(file.data);
                }
                allCalculatedData[file.name] = calculated;
            });

            const allTimePoints = new Set();
            for (const fileName in allCalculatedData) {
                for (const industry of selectedIndustries) {
                    const data = allCalculatedData[fileName][industry];
                    if (data) {
                        data.forEach(p => allTimePoints.add(p.time));
                    }
                }
            }

            let timePoints;
            if (dimension === 'month') {
                const years = new Set();
                allTimePoints.forEach(t => years.add(getYearFromTime(t)));
                const sortedYears = Array.from(years).sort((a, b) => a - b);
                
                const latestTime = Array.from(allTimePoints).sort((a, b) => {
                    const yearA = getYearFromTime(a);
                    const yearB = getYearFromTime(b);
                    if (yearA !== yearB) return yearB - yearA;
                    return getMonthFromTime(b) - getMonthFromTime(a);
                })[0];
                const latestYear = getYearFromTime(latestTime);
                const latestMonth = getMonthFromTime(latestTime);
                
                const allMonths = [];
                const startYear = sortedYears[0];
                for (let y = startYear; y <= latestYear; y++) {
                    const endMonth = (y === latestYear) ? latestMonth : 12;
                    for (let m = 1; m <= endMonth; m++) {
                        allMonths.push(`${y}-${String(m).padStart(2, '0')}`);
                    }
                }
                timePoints = allMonths.slice(-37);
            } else {
                const years = new Set();
                allTimePoints.forEach(t => years.add(getYearFromTime(t)));
                const sortedYears = Array.from(years).sort((a, b) => a - b);
                
                const latestTime = Array.from(allTimePoints).sort((a, b) => {
                    const yearA = getYearFromTime(a);
                    const yearB = getYearFromTime(b);
                    if (yearA !== yearB) return yearB - yearA;
                    return getQuarterNum(b) - getQuarterNum(a);
                })[0];
                const latestYear = getYearFromTime(latestTime);
                const latestQuarter = getQuarterNum(latestTime);
                
                const allQuarters = [];
                const startYear = sortedYears[0];
                for (let y = startYear; y <= latestYear; y++) {
                    const endQ = (y === latestYear) ? latestQuarter : 4;
                    for (let q = 1; q <= endQ; q++) {
                        allQuarters.push(`${y}-Q${q}`);
                    }
                }
                timePoints = allQuarters.slice(-20);
            }

            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#fa709a'];
            const series = [];
            let colorIdx = 0;

            for (const fileName in allCalculatedData) {
                for (const industry of selectedIndustries) {
                    const data = allCalculatedData[fileName][industry];
                    if (!data) continue;

                    const color = colors[colorIdx % colors.length];
                    const shortName = extractIndustryName(industry);
                    const seriesName = uploadedFiles.length > 1 ? `${extractIndustryName(fileName)} - ${shortName}` : shortName;

                    series.push({
                        name: `${seriesName}累计同比增长（%）`,
                        type: 'line',
                        data: timePoints.map(t => {
                            const p = data.find(d => d.time === t);
                            return p ? p.cumulative : null;
                        }),
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        connectNulls: true,
                        lineStyle: { width: 3, color: color },
                        itemStyle: { color: color }
                    });
                    colorIdx++;
                }
            }

            const xAxisTicks = timePoints.length <= 12 ? timePoints : 
                timePoints.filter((_, i) => i % Math.ceil(timePoints.length / 12) === 0);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        if (!params || params.length === 0) return '';
                        const timeValue = params[0].axisValue;
                        const month = getMonthFromTime(timeValue);
                        if (month === 1) return '';
                        const hasData = params.some(item => item.value !== null && item.value !== undefined);
                        if (!hasData) return '';
                        let result = timeValue + '<br/>';
                        params.forEach(item => {
                            let val = item.value;
                            if (val !== null && val !== undefined) {
                                if (Math.abs(val) >= 1) {
                                    val = val.toPrecision(3);
                                } else {
                                    val = val.toFixed(2);
                                }
                                if (parseFloat(val) > 0) {
                                    val = '+' + val;
                                } else {
                                    val = '&nbsp;' + val;
                                }
                            }
                            result += `${item.marker} ${item.seriesName}: ${val}<br/>`;
                        });
                        return result;
                    }
                },
                legend: { top: 10, type: 'scroll' },
                grid: { top: 80, right: 80, bottom: 60, left: 80 },
                xAxis: {
                    type: 'category',
                    data: timePoints,
                    axisLabel: {
                        rotate: 45,
                        formatter: function(value) {
                            if (dimension === 'month') {
                                const month = getMonthFromTime(value);
                                if (month === 3 || month === 6 || month === 9 || month === 12) {
                                    return value;
                                }
                                return '';
                            }
                            return value;
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '累计增长(%)',
                    splitNumber: 6
                },
                series: series
            };

            chart.setOption(option, true);
            updateStats(allCalculatedData);
        }

        function updateStats(calculatedData) {
            const stats = document.getElementById('stats');
            let totalFiles = uploadedFiles.length;
            let totalIndustries = availableIndustries.length;
            let selectedCount = selectedIndustries.length;
            
            let dataPoints = 0;
            for (const file of uploadedFiles) {
                for (const ind in file.data.industries) {
                    dataPoints += file.data.industries[ind].length;
                }
            }

            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">上传文件数</div>
                    <div class="stat-value">${totalFiles}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">可用行业</div>
                    <div class="stat-value">${totalIndustries}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">选中行业</div>
                    <div class="stat-value">${selectedCount}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">数据点总数</div>
                    <div class="stat-value">${dataPoints}</div>
                </div>
            `;
        }

        function saveToLocal() {
            const exportObj = {
                files: uploadedFiles,
                selectedIndustries: selectedIndustries,
                exportTime: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            a.download = `固定资产数据_${ts}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('fixedAssetData');
            if (saved) {
                try {
                    const obj = JSON.parse(saved);
                    if (obj.files) {
                        uploadedFiles = obj.files;
                        selectedIndustries = obj.selectedIndustries || [];
                    } else if (Array.isArray(obj)) {
                        uploadedFiles = obj;
                    }
                    updateUI();
                } catch(e) {
                    localStorage.removeItem('fixedAssetData');
                }
            }
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const obj = JSON.parse(ev.target.result);
                        if (obj.files) {
                            uploadedFiles = obj.files;
                            selectedIndustries = obj.selectedIndustries || [];
                        } else if (Array.isArray(obj)) {
                            uploadedFiles = obj;
                        }
                        updateUI();
                        alert('数据导入成功！');
                    } catch(e) {
                        alert('文件格式错误，无法导入！');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }


    </script>
</body>
